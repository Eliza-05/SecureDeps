name: SAST Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Bandit — análisis estático Python
  # ─────────────────────────────────────────
  bandit:
    name: SAST - Bandit (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Bandit
        run: pip install bandit[sarif]

      - name: Ejecutar Bandit
        run: |
          bandit -r app/ \
            --format sarif \
            --output bandit-results.sarif \
            --exit-zero

      - name: Subir resultados a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Guardar reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results-${{ github.run_number }}
          path: bandit-results.sarif
          retention-days: 30

      - name: Resumen Bandit
        if: always()
        run: |
          echo "## SAST — Bandit (Python)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          bandit -r app/ --format text --exit-zero >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────────────
  # JOB 2: Semgrep — análisis multi-regla
  # ─────────────────────────────────────────
  semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Ejecutar Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/flask \
            --sarif \
            --output semgrep-results.sarif \
            app/ || true

      - name: Subir resultados a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Guardar reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results-${{ github.run_number }}
          path: semgrep-results.sarif
          retention-days: 30

      - name: Resumen Semgrep
        if: always()
        run: |
          echo "## SAST — Semgrep" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/flask \
            --text \
            app/ >> $GITHUB_STEP_SUMMARY || true
