name: Secret Detection

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Gitleaks — escaneo del historial Git
  # Usa la action oficial que maneja la instalación y genera results.sarif
  # ─────────────────────────────────────────
  gitleaks:
    name: Secret Detection - Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Subir resultados a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Guardar reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('results.sarif') != ''
        with:
          name: gitleaks-results-${{ github.run_number }}
          path: results.sarif
          retention-days: 30

      - name: Resumen
        if: always()
        run: |
          echo "## Secret Detection — Gitleaks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Escaneo de historial Git completo. Revisa Security > Code scanning para ver hallazgos." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # JOB 2: TruffleHog — verifica secretos activos
  # En push a main usa HEAD~1 como base (no el mismo commit)
  # En pull_request usa los SHAs del PR
  # ─────────────────────────────────────────
  trufflehog:
    name: Secret Detection - TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar TruffleHog (push a main)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified

      - name: Ejecutar TruffleHog (pull request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.88.1
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Resumen
        if: always()
        run: |
          echo "## Secret Detection — TruffleHog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Escaneo con verificación de secretos activos completado." >> $GITHUB_STEP_SUMMARY
          echo "TruffleHog solo reporta secretos que pueden verificarse como activos." >> $GITHUB_STEP_SUMMARY
