name: Secret Detection

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Gitleaks — escaneo del historial Git
  # ─────────────────────────────────────────
  gitleaks:
    name: Secret Detection - Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Ejecutar Gitleaks y generar SARIF
        run: |
          gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path gitleaks-results.sarif \
            --exit-code 0

      - name: Subir resultados a GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Guardar reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results-${{ github.run_number }}
          path: gitleaks-results.sarif
          retention-days: 30

      - name: Resumen
        if: always()
        run: |
          echo "## Secret Detection — Gitleaks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          gitleaks detect --source . --exit-code 0 2>&1 >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────────────
  # JOB 2: TruffleHog — verifica secretos activos
  # ─────────────────────────────────────────
  trufflehog:
    name: Secret Detection - TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código (historial completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecutar TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Resumen
        if: always()
        run: |
          echo "## Secret Detection — TruffleHog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Escaneo con verificación de secretos activos completado." >> $GITHUB_STEP_SUMMARY
          echo "TruffleHog solo reporta secretos que pueden verificarse como activos." >> $GITHUB_STEP_SUMMARY
