name: SCA Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Escaneo de vulnerabilidades
  # ─────────────────────────────────────────
  sca-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Escanear dependencias con Trivy
        run: |
          trivy fs ./app \
            --scanners vuln \
            --format table \
            --exit-code 0

      - name: Generar reporte JSON
        run: |
          trivy fs ./app \
            --scanners vuln \
            --format json \
            --output trivy-report.json \
            --exit-code 0

      - name: Generar reporte SARIF (para GitHub Security tab)
        run: |
          trivy fs ./app \
            --scanners vuln \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0

      - name: Subir resultados a GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Guardar reporte JSON como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ github.run_number }}
          path: trivy-report.json
          retention-days: 30

      - name: Resumen de vulnerabilidades
        if: always()
        run: |
          echo "## Resultados del escaneo SCA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          trivy fs ./app \
            --scanners vuln \
            --format table \
            --exit-code 0 >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────────────
  # JOB 2: Tests de la aplicación
  # ─────────────────────────────────────────
  run-tests:
    name: Run Application Tests
    runs-on: ubuntu-latest
    needs: sca-scan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install pytest

      - name: Correr tests
        run: pytest tests/ -v